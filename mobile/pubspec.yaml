name: project_milestone
description: "Project Milestone - Construction & Project Management Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.7.0

  # Local storage
  flutter_secure_storage: ^9.2.2

  # File picking
  file_picker: ^8.0.0

  # URL launcher
  url_launcher: ^6.2.0

  # UI & Formatting
  intl: ^0.19.0

  # State & Architecture
  equatable: ^2.0.5
  get_it: ^8.0.3

  # UI Enhancements
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # Image handling
  image_picker: ^1.1.2

  # Path utilities
  path_provider: ^2.1.5

  # Share functionality
  share_plus: ^10.1.4

  # PDF generation
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true