databases:
  - name: project-milestone-db
    plan: free
    databaseName: project_milestone
    user: project_milestone_user

services:
  - type: web
    name: project-milestone-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/auth/me
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: project-milestone-db
          property: connectionString
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: DB_MIGRATIONS_RUN
        value: "false"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: FRONTEND_URLS
        value: https://project-milestone-web.onrender.com

  - type: web
    name: project-milestone-web
    runtime: static
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://project-milestone-api.onrender.com/api/v1
      - key: VITE_WS_URL
        value: https://project-milestone-api.onrender.com
